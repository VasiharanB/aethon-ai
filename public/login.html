

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AETHON Login</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
  radial-gradient(circle at top left,#2e1065,transparent 35%),
  radial-gradient(circle at bottom right,#1e1b4b,transparent 35%),
  #05010a;
}

.login-box{
  width:390px;
  max-width: 100%;
  padding:35px;
  border-radius:18px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(14px);
  color:#fff;
}

.logo{
  width:60px;
  height:60px;
  margin:auto;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  background:linear-gradient(135deg,#7c3aed,#9333ea);
}

h1{
  text-align:center;
  margin-top:18px;
}

.sub{
  text-align:center;
  margin:8px 0 25px;
  color:#aaa;
}

.field{
  margin-bottom:15px;
  position:relative;
}

.field i{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  color:#aaa;
}

.field input{
  width:100%;
  padding:14px 14px 14px 42px;
  border:none;
  outline:none;
  border-radius:12px;
  background:rgba(255,255,255,.07);
  color:#fff;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  color:#fff;
  font-weight:600;
  margin-top:8px;
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
}

.msg{
  margin-top:14px;
  text-align:center;
  color:#ff7b7b;
  min-height:22px;
}

@media (max-width: 480px) {
  .login-box {
    width: 100%;
    margin: 15px;
    padding: 25px 20px;
  }
}
</style>
</head>

<body>
<canvas id="bg-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; pointer-events: none;"></canvas>

<div class="login-box" id="auth-container">

  <div style="text-align: center; margin-bottom: 25px;">
    <img src="assets/logo.png" alt="Aethon Logo" style="height: 90px; width: auto; object-fit: contain;">
  </div>

  <div id="login-section">
    <h1 id="login-title">AETHON Login</h1>
    <p class="sub" id="login-sub">Login to continue</p>

    <div class="field">
      <i class="ri-mail-line"></i>
      <input type="text" id="email" placeholder="Email">
    </div>

    <div class="field">
      <i class="ri-lock-line"></i>
      <input type="password" id="password" placeholder="Password">
    </div>

    <div style="text-align: center; margin-bottom: 15px;">
      <a href="#" onclick="showForgot()" style="color: #a78bfa; text-decoration: none; font-size: 14px;">Forgot Password?</a>
    </div>

    <button class="btn" onclick="login()">Login</button>
  </div>

  <div id="forgot-section" style="display: none;">
    <h1>Reset Password</h1>
    <p class="sub">Enter your email to receive an OTP</p>

    <div class="field">
      <i class="ri-mail-line"></i>
      <input type="text" id="forgot-email" placeholder="Email">
    </div>

    <button class="btn" onclick="sendOtp()">Send OTP</button>
    <div style="text-align: center; margin-top: 15px;">
      <a href="#" onclick="showLogin()" style="color: #a78bfa; text-decoration: none; font-size: 14px;">Back to Login</a>
    </div>
  </div>

  <div id="reset-section" style="display: none;">
    <h1>Verify OTP</h1>
    <p class="sub">Enter the OTP sent to your email</p>

    <div class="field">
      <i class="ri-key-2-line"></i>
      <input type="text" id="reset-otp" placeholder="4-Digit OTP">
    </div>

    <div class="field">
      <i class="ri-lock-line"></i>
      <input type="password" id="reset-password" placeholder="New Password">
    </div>

    <button class="btn" onclick="resetPassword()">Update Password</button>
  </div>

  <div class="msg" id="msg"></div>

</div>

<script>
  // Dynamic Title based on Role Parameter
  const params = new URLSearchParams(window.location.search);
  const roleParam = params.get('role');
  if (roleParam === 'admin') {
    document.getElementById('login-title').innerText = 'AETHON Admin';
    document.getElementById('login-sub').innerText = 'Login to Admin Dashboard';
  } else if (roleParam === 'student') {
    document.getElementById('login-title').innerText = 'AETHON Student';
    document.getElementById('login-sub').innerText = 'Login to Student Portal';
  }
</script>
<script src="js/auth.js"></script>
<script src="js/landing.js"></script>

</body>
</html>
