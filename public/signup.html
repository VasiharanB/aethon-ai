<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AETHON Sign Up</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif;}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:radial-gradient(circle at top left,#2e1065,transparent 35%),radial-gradient(circle at bottom right,#1e1b4b,transparent 35%),#05010a;}
.login-box{width:390px;max-width: 100%;padding:35px;border-radius:18px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(14px);color:#fff;}
.logo{width:60px;height:60px;margin:auto;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;background:linear-gradient(135deg,#7c3aed,#9333ea);}
h1{text-align:center;margin-top:18px;}
.sub{text-align:center;margin:8px 0 25px;color:#aaa;}
.field{margin-bottom:15px;position:relative;}
.field i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#aaa;}
.field input{width:100%;padding:14px 14px 14px 42px;border:none;outline:none;border-radius:12px;background:rgba(255,255,255,.07);color:#fff;}
.btn{width:100%;padding:14px;border:none;border-radius:14px;cursor:pointer;color:#fff;font-weight:600;margin-top:8px;background:linear-gradient(135deg,#4f46e5,#7c3aed);}
.msg{margin-top:14px;text-align:center;color:#ff7b7b;min-height:22px;}
@media (max-width: 480px) { .login-box { width: 100%; margin: 15px; padding: 25px 20px; } }
</style>
</head>
<body>
<canvas id="bg-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; pointer-events: none;"></canvas>

<div class="login-box">
  <div style="text-align: center; margin-bottom: 25px;">
    <img src="assets/logo.png" alt="Aethon Logo" style="height: 90px; width: auto; object-fit: contain;">
  </div>
  <p class="sub">Create your Student Account</p>

  <div class="field">
    <i class="ri-user-line"></i>
    <input type="text" id="name" placeholder="Full Name">
  </div>
  <div class="field">
    <i class="ri-mail-line"></i>
    <input type="text" id="email" placeholder="Email Address">
  </div>
  <div class="field">
    <i class="ri-lock-line"></i>
    <input type="password" id="password" placeholder="Password">
  </div>
  <div class="field">
    <i class="ri-lock-password-line"></i>
    <input type="password" id="confirm_password" placeholder="Confirm Password">
  </div>
  <div class="field">
    <i class="ri-building-line"></i>
    <input type="text" id="college" placeholder="College Name (Optional)">
  </div>

  <button class="btn" onclick="signup()">Sign Up</button>

  <div style="text-align: center; margin-top: 15px;">
    <a href="login.html" style="color: #a78bfa; text-decoration: none; font-size: 14px;">Already have an account? Log in</a>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script>
async function signup(){
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const confirmPassword = document.getElementById("confirm_password").value.trim();
  const college = document.getElementById("college").value.trim();
  const msg = document.getElementById("msg");

  msg.innerText = "";

  if(!name || !email || !password || !confirmPassword){
    msg.innerText = "Please fill all required fields";
    return;
  }

  if(password !== confirmPassword){
    msg.innerText = "Passwords do not match!";
    return;
  }

  try{
    const res = await fetch("/register-user",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ name, email, password, college_name: college })
    });
    const data = await res.json();

    if(data.success){
      msg.style.color = "#10b981";
      msg.innerText = "Account created! Redirecting to login...";
      setTimeout(() => window.location.href = "login.html", 1500);
    }else{
      msg.style.color = "#ff7b7b";
      msg.innerText = data.error || "Failed to create account";
    }
  }catch(error){
    msg.style.color = "#ff7b7b";
    msg.innerText = "Server error";
  }
}
</script>
<script src="js/landing.js"></script>
</body>
</html>
